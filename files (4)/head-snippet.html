<!-- ════════════════════════════════════════════════
     로고 & 파비콘 (모든 <head> 안에 붙여넣기)
     ════════════════════════════════════════════════ -->

<!-- Favicon -->
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">

<!-- Apple Touch Icon -->
<link rel="apple-touch-icon" sizes="192x192" href="/apple-touch-icon.png">

<!-- PWA Manifest -->
<link rel="manifest" href="/site.webmanifest">
<meta name="theme-color" content="#4da6ff">

<!-- Open Graph (Facebook / KakaoTalk / 링크 미리보기) -->
<meta property="og:type"        content="website">
<meta property="og:url"         content="https://your-domain.com/">
<meta property="og:title"       content="사이트 제목">
<meta property="og:description" content="사이트 설명을 입력하세요.">
<meta property="og:image"       content="https://your-domain.com/og-image.png">
<meta property="og:image:width"  content="1200">
<meta property="og:image:height" content="630">
<meta property="og:locale"      content="ko_KR">

<!-- Twitter Card -->
<meta name="twitter:card"        content="summary_large_image">
<meta name="twitter:url"         content="https://your-domain.com/">
<meta name="twitter:title"       content="사이트 제목">
<meta name="twitter:description" content="사이트 설명을 입력하세요.">
<meta name="twitter:image"       content="https://your-domain.com/og-image.png">

<!-- ════════════════════════════════════════════════ -->
